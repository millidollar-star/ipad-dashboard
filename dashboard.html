<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#FAFAF8;--border:#E8E6E0;
  --text-primary:#1A1814;--text-secondary:#6B6760;--text-muted:#A09D97;
  --accent:#2D6A4F;--accent-soft:#D8EDE3;
  --warn:#C06014;--red:#C0392B;--red-soft:#FDECEA;
  --radius-sm:8px;--radius:14px;--radius-lg:20px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,.10);
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --gap:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text-primary);font-family:var(--font-body);font-size:15px;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}

/* ── PIN SCREEN ── */
#pin-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;padding:40px 24px;}
#pin-screen.hidden{display:none;}
.pin-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:36px 32px;text-align:center;width:100%;max-width:360px;}
.pin-card h2{font-family:var(--font-display);font-size:24px;margin-bottom:6px;}
.pin-card p{color:var(--text-secondary);font-size:14px;margin-bottom:24px;}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:background .15s,border-color .15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-key{padding:16px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface2);font-size:20px;font-weight:500;cursor:pointer;transition:background .12s,transform .1s;font-family:var(--font-body);color:var(--text-primary);-webkit-tap-highlight-color:transparent;}
.pin-key:active{background:var(--border);transform:scale(.95);}
.pin-key.wide{grid-column:span 2;}
.pin-error{color:var(--red);font-size:13px;font-weight:500;min-height:18px;margin-top:-10px;margin-bottom:6px;}
.pin-hint{font-size:12px;color:var(--text-muted);margin-top:12px;}

/* ── MAIN APP ── */
#app{display:grid;grid-template-rows:auto 1fr;height:100dvh;padding:env(safe-area-inset-top,12px) env(safe-area-inset-right,0) env(safe-area-inset-bottom,12px) env(safe-area-inset-left,0);overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;gap:12px;}
.header-left h1{font-family:var(--font-display);font-size:26px;letter-spacing:-.3px;line-height:1.1;}
.header-left .date-sub{font-size:13px;color:var(--text-secondary);font-weight:400;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.sync-info{font-size:11px;color:var(--text-muted);text-align:right;line-height:1.4;}
.btn-icon{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s,transform .1s;flex-shrink:0;}
.btn-icon:active{transform:scale(.93);background:var(--border);}
main{overflow-y:auto;overflow-x:hidden;padding:0 12px 20px;-webkit-overflow-scrolling:touch;}

/* ── TILES GRID ── */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);max-width:1024px;margin:0 auto;}
.tile-full{grid-column:1 / -1;}
@media(max-width:600px){.tiles{grid-template-columns:1fr;}}
.tile{background:var(--surface);border-radius:var(--radius-lg);border:1.5px solid var(--border);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;}
.tile-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.tile-title{font-family:var(--font-display);font-size:17px;display:flex;align-items:center;gap:7px;}
.tile-body{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;}
.tile-meta{font-size:12px;color:var(--text-muted);}

/* ── DATE RANGE FILTER ── */
.date-filter{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px 10px;border-bottom:1px solid var(--border);}
.date-chip{font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;white-space:nowrap;transition:background .12s;-webkit-tap-highlight-color:transparent;}
.date-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}

/* ── EVENTS ── */
.event-row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
.event-row:last-child{border-bottom:none;}
.event-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.event-info{flex:1;min-width:0;}
.event-title{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-time{font-size:12px;color:var(--text-secondary);margin-top:1px;}
.event-date{font-size:11px;color:var(--text-muted);margin-top:1px;}
.event-loc{font-size:11px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── TODOS ── */
.todo-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.todo-row:last-child{border-bottom:none;}
.todo-row.completed .todo-title{text-decoration:line-through;color:var(--text-muted);}
.todo-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:background .15s,border-color .15s;}
.todo-row.completed .todo-check{background:var(--accent);border-color:var(--accent);color:white;}
.todo-title{font-size:14px;font-weight:400;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.todo-due{font-size:11px;color:var(--text-muted);flex-shrink:0;}
.todo-due.overdue{color:var(--red);}
.priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── ADD TODO INPUT ── */
.todo-add{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface2);}
.todo-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:14px;background:var(--surface);outline:none;}
.todo-input:focus{border-color:var(--accent);}
.todo-add-btn{padding:8px 14px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.todo-add-btn:active{opacity:.8;}

/* ── REMINDER LIST CHIPS (single-select) ── */
.list-filter{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px 10px;border-bottom:1px solid var(--border);}
.list-chip{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:background .12s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.list-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}

/* ── PINNED LIST TILES ── */
.pinned-tile-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.pinned-tile-title{font-family:var(--font-display);font-size:17px;display:flex;align-items:center;gap:7px;}
.unpin-btn{font-size:11px;color:var(--text-muted);cursor:pointer;padding:2px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);-webkit-tap-highlight-color:transparent;}
.unpin-btn:active{background:var(--border);}

/* ── ADD LIST TILE BUTTON ── */
.add-tile-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:2px dashed var(--border);border-radius:var(--radius-lg);background:transparent;cursor:pointer;padding:28px 16px;color:var(--text-muted);font-family:var(--font-body);font-size:14px;font-weight:500;transition:border-color .15s,color .15s;-webkit-tap-highlight-color:transparent;}
.add-tile-btn:active{border-color:var(--accent);color:var(--accent);}

/* ── ADD LIST SHEET ── */
#add-list-sheet{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;}
#add-list-sheet.open{display:flex;}
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(2px);}
.sheet{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 20px 40px;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-family:var(--font-display);font-size:19px;margin-bottom:14px;}
.sheet-list-option{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.sheet-list-option:last-child{border-bottom:none;}
.sheet-list-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.sheet-list-name{font-size:15px;font-weight:500;flex:1;}
.sheet-list-count{font-size:12px;color:var(--text-muted);}
.sheet-cancel{margin-top:14px;width:100%;padding:12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);font-family:var(--font-body);font-size:15px;cursor:pointer;}

/* ── SETTINGS PANEL ── */
#settings-panel{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;}
#settings-panel.open{display:flex;}
.settings-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(2px);}
.settings-sheet{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 20px 36px;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;max-height:80vh;overflow-y:auto;}
.settings-sheet h2{font-family:var(--font-display);font-size:20px;margin-bottom:16px;}
.settings-section-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;margin-top:16px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:14px;font-weight:500;}
.toggle{position:relative;width:44px;height:26px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;border-radius:13px;background:var(--border);transition:background .2s;}
.toggle input:checked+.toggle-track{background:var(--accent);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s;}
.toggle input:checked~.toggle-thumb{transform:translateX(18px);}
.settings-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:14px;background:var(--surface2);margin-top:6px;outline:none;}
.settings-input:focus{border-color:var(--accent);}
.btn-primary{margin-top:16px;width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;}
.btn-primary:active{opacity:.8;}
.btn-secondary{margin-top:8px;width:100%;padding:12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text-primary);font-family:var(--font-body);font-size:15px;cursor:pointer;}
.lock-btn{font-size:12px;color:var(--text-muted);text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline;}

/* ── WEATHER ── */
.weather-body{display:flex;align-items:center;gap:16px;padding:14px 16px;}
.weather-icon{font-size:44px;line-height:1;}
.weather-main .temp{font-family:var(--font-display);font-size:42px;line-height:1;letter-spacing:-1px;}
.weather-main .condition{font-size:14px;color:var(--text-secondary);margin-top:2px;}
.weather-main .location{font-size:11px;color:var(--text-muted);margin-top:1px;}
.weather-details{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;padding-left:16px;border-left:1px solid var(--border);}
.wd-item{font-size:12px;}.wd-label{color:var(--text-muted);font-size:11px;}

/* ── MISC ── */
.empty{color:var(--text-muted);font-size:13px;padding:12px 0;text-align:center;}
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--surface2) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;height:14px;margin:6px 0;}
@keyframes shimmer{to{background-position:-200% 0}}
.spin{animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:white;font-size:13px;padding:8px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;white-space:nowrap;}
#toast.show{opacity:1;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-card">
    <h2>Dashboard</h2>
    <p>Enter your PIN to access</p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-numpad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key wide" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-hint">PIN required to view or interact</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-left">
      <h1 id="header-date">Good morning</h1>
      <div class="date-sub" id="header-datestr">Loading…</div>
    </div>
    <div class="header-right">
      <div class="sync-info">
        <div id="sync-label">Syncing…</div>
        <div id="next-refresh" style="color:var(--text-muted)"></div>
      </div>
      <button class="btn-icon" id="btn-refresh" title="Refresh" onclick="refreshAll()">↻</button>
      <button class="btn-icon" title="Settings" onclick="openSettings()">⚙</button>
    </div>
  </header>

  <main>
    <div class="tiles" id="tiles-grid">

      <!-- EVENTS TILE (full width) -->
      <div class="tile tile-full">
        <div class="tile-header">
          <span class="tile-title">📅 Events</span>
          <span class="tile-meta" id="events-count"></span>
        </div>
        <!-- Date range filter -->
        <div class="date-filter">
          <div class="date-chip active" data-days="0" onclick="setDateRange(0,this)">Today</div>
          <div class="date-chip" data-days="1" onclick="setDateRange(1,this)">Today + Tomorrow</div>
          <div class="date-chip" data-days="7" onclick="setDateRange(7,this)">1 Week</div>
          <div class="date-chip" data-days="14" onclick="setDateRange(14,this)">2 Weeks</div>
        </div>
        <div class="tile-body" id="events-list" style="max-height:280px;">
          <div class="skeleton"></div><div class="skeleton" style="width:70%"></div>
        </div>
      </div>

      <!-- TO DO TILE -->
      <div class="tile">
        <div class="tile-header">
          <span class="tile-title">✅ To Do</span>
          <span class="tile-meta" id="todo-count"></span>
        </div>
        <div class="tile-body" id="todo-list" style="max-height:300px;">
          <div class="skeleton"></div><div class="skeleton" style="width:80%"></div>
        </div>
        <div class="todo-add">
          <input class="todo-input" id="todo-input" placeholder="Add a to do…" onkeydown="if(event.key==='Enter')addTodo()" />
          <button class="todo-add-btn" onclick="addTodo()">Add</button>
        </div>
      </div>

      <!-- WEATHER TILE -->
      <div class="tile">
        <div class="tile-header">
          <span class="tile-title">🌤 Weather</span>
          <span class="tile-meta" id="weather-location-label"></span>
        </div>
        <div class="weather-body" id="weather-body">
          <div style="flex:1"><div class="skeleton"></div><div class="skeleton" style="width:60%"></div></div>
        </div>
      </div>

      <!-- REMINDERS TILE (single-select list view) -->
      <div class="tile tile-full" id="tile-reminders">
        <div class="tile-header">
          <span class="tile-title">🗒 Reminders</span>
          <span class="tile-meta" id="reminder-count"></span>
        </div>
        <div class="list-filter" id="list-filter"></div>
        <div class="tile-body" id="reminders-list" style="max-height:280px;">
          <div class="skeleton"></div><div class="skeleton" style="width:75%"></div>
        </div>
        <div class="todo-add" id="reminders-add" style="display:none;">
          <input class="todo-input" id="reminders-input" placeholder="Add to list…"
            onkeydown="if(event.key==='Enter')addToActiveList()" />
          <button class="todo-add-btn" onclick="addToActiveList()">Add</button>
        </div>
      </div>

      <!-- PINNED LIST TILES inserted here dynamically -->
      <div id="pinned-tiles"></div>

      <!-- ADD LIST TILE BUTTON -->
      <button class="add-tile-btn" onclick="openAddListSheet()">
        <span style="font-size:20px;">＋</span> Pin a list as its own tile
      </button>

    </div><!-- .tiles -->
  </main>
</div>

<!-- ADD LIST SHEET -->
<div id="add-list-sheet">
  <div class="sheet-backdrop" onclick="closeAddListSheet()"></div>
  <div class="sheet">
    <h3>Pin a Reminder List</h3>
    <div id="add-list-options"></div>
    <button class="sheet-cancel" onclick="closeAddListSheet()">Cancel</button>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div id="settings-panel">
  <div class="settings-backdrop" onclick="closeSettings()"></div>
  <div class="settings-sheet">
    <h2>Settings</h2>
    <div class="settings-section-label">Weather</div>
    <label>Location (city, state)
      <input class="settings-input" id="set-weather-loc" placeholder="e.g. Albuquerque, NM" />
    </label>
    <label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:14px;">
      <input type="checkbox" id="set-units" /> Show in Celsius
    </label>
    <div class="settings-section-label">To Do List Name</div>
    <input class="settings-input" id="set-todo-list" placeholder="e.g. To Do" />
    <div class="settings-section-label">Reminder Lists</div>
    <div id="list-toggles"></div>
    <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
    <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
    <div class="lock-btn" onclick="lockDashboard()">🔒 Lock dashboard</div>
  </div>
</div>

<div id="toast"></div>

let allEvents      = [];
let allReminders   = [];
let reminderLists  = [];      // [{id,name,color,visible}]
let activeListId   = null;    // single-select — only one list shown in reminders tile
let pinnedListIds  = [];      // list ids pinned as their own tiles
let dateRangeDays  = 0;       // 0=today,1=+1day,7=1wk,14=2wks
let todoListName   = "To Do"; // name of the list shown in the To Do tile
let settings       = { weatherLocation: "Albuquerque, NM", units: "imperial" };
let refreshTimer   = null;
let nextRefreshAt  = null;
let pinBuffer      = "";
const PIN_MAX      = 4;

// ── PIN ───────────────────────────────────────────────────────────────────────
async function checkExistingSession() {
  const token = sessionStorage.getItem(SESSION_KEY);
  if (!token) return false;
  try {
    const res  = await fetch(VERIFY_PIN_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({token}) });
    const data = await res.json();
    return data.valid === true;
  } catch { return false; }
}

function updatePinDots() {
  for (let i = 0; i < PIN_MAX; i++)
    document.getElementById("pd" + i)?.classList.toggle("filled", i < pinBuffer.length);
}

function pinKey(digit) {
  if (pinBuffer.length >= PIN_MAX) return;
  pinBuffer += digit;
  updatePinDots();
  document.getElementById("pin-error").textContent = "";
  if (pinBuffer.length === PIN_MAX) submitPin();
}

function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); }

async function submitPin() {
  document.querySelectorAll(".pin-key").forEach(b => b.disabled = true);
  try {
    const res  = await fetch(VERIFY_PIN_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({pin:pinBuffer}) });
    const data = await res.json();
    if (data.valid && data.token) {
      sessionStorage.setItem(SESSION_KEY, data.token);
      document.getElementById("pin-screen").classList.add("hidden");
      initDashboard();
    } else {
      document.getElementById("pin-error").textContent = "Incorrect PIN — try again";
      pinBuffer = ""; updatePinDots();
    }
  } catch {
    document.getElementById("pin-error").textContent = "Connection error — try again";
    pinBuffer = ""; updatePinDots();
  }
  document.querySelectorAll(".pin-key").forEach(b => b.disabled = false);
}

function lockDashboard() {
  sessionStorage.removeItem(SESSION_KEY);
  closeSettings(); pinBuffer = ""; updatePinDots();
  document.getElementById("pin-error").textContent = "";
  document.getElementById("pin-screen").classList.remove("hidden");
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async () => {
  if (await checkExistingSession()) initDashboard();
});

async function initDashboard() {
  updateHeader();
  await loadSettings();
  await refreshAll();
  scheduleNextRefresh();
  subscribeRealtime();
}

function updateHeader() {
  const now = new Date();
  const h   = now.getHours();
  document.getElementById("header-date").textContent =
    h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
  document.getElementById("header-datestr").textContent =
    now.toLocaleDateString("en-US", {weekday:"long",month:"long",day:"numeric"});
}

// ── Settings ──────────────────────────────────────────────────────────────────
async function loadSettings() {
  try {
    const { data } = await sb.from("dashboard_settings").select("*");
    if (!data) return;
    data.forEach(row => {
      const v = JSON.parse(row.value);
      if (row.key === "weather_location")  settings.weatherLocation = v;
      if (row.key === "weather_units")     settings.units = v;
      if (row.key === "last_synced")       updateSyncLabel(v);
      if (row.key === "todo_list_name")    todoListName = v || "To Do";
      if (row.key === "pinned_list_ids")   pinnedListIds = Array.isArray(v) ? v : [];
      if (row.key === "active_list_id")    activeListId = v;
    });
  } catch(e) { console.warn("Settings load failed", e); }
}

async function saveSetting(key, value) {
  await sb.from("dashboard_settings").upsert({key, value: JSON.stringify(value)}, {onConflict:"key"});
}

function openSettings() {
  document.getElementById("set-weather-loc").value = settings.weatherLocation;
  document.getElementById("set-units").checked = settings.units === "metric";
  document.getElementById("set-todo-list").value = todoListName;
  const wrap = document.getElementById("list-toggles");
  wrap.innerHTML = reminderLists.map(list => `
    <div class="toggle-row">
      <div class="toggle-label" style="display:flex;align-items:center;gap:6px;">
        <span style="width:10px;height:10px;border-radius:50%;background:${list.color};display:inline-block;"></span>
        ${esc(list.name)}
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-${list.id}" ${list.visible !== false ? "checked" : ""} />
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>`).join("");
  document.getElementById("settings-panel").classList.add("open");
}
function closeSettings() { document.getElementById("settings-panel").classList.remove("open"); }

async function saveSettings() {
  const loc   = document.getElementById("set-weather-loc").value.trim() || settings.weatherLocation;
  const units = document.getElementById("set-units").checked ? "metric" : "imperial";
  const tdName= document.getElementById("set-todo-list").value.trim() || "To Do";
  settings.weatherLocation = loc;
  settings.units = units;
  todoListName   = tdName;
  reminderLists.forEach(list => {
    const el = document.getElementById("toggle-" + list.id);
    if (el) list.visible = el.checked;
  });
  await Promise.all([
    saveSetting("weather_location", loc),
    saveSetting("weather_units", units),
    saveSetting("todo_list_name", tdName),
  ]);
  for (const list of reminderLists)
    await sb.from("reminder_lists").update({visible: list.visible}).eq("id", list.id);
  closeSettings();
  toast("Settings saved");
  renderTodoTile();
  renderListFilter();
  renderRemindersTile();
  fetchWeather();
}

// ── Refresh ───────────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById("btn-refresh");
  btn.innerHTML = '<span class="spin">↻</span>'; btn.disabled = true;
  updateHeader();
  await Promise.allSettled([fetchEvents(), fetchReminders(), fetchWeather()]);
  scheduleNextRefresh();
  btn.innerHTML = "↻"; btn.disabled = false;
}

function scheduleNextRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  nextRefreshAt = Date.now() + 30 * 60 * 1000;
  refreshTimer  = setTimeout(() => refreshAll(), 30 * 60 * 1000);
  updateCountdown();
}

function updateCountdown() {
  const el = document.getElementById("next-refresh");
  const remaining = Math.round((nextRefreshAt - Date.now()) / 60000);
  el.textContent = `Refresh in ${remaining}m`;
  setTimeout(updateCountdown, 60000);
}

function updateSyncLabel(isoStr) {
  const el = document.getElementById("sync-label");
  if (!isoStr) { el.textContent = "Not yet synced"; return; }
  el.textContent = "Synced " + new Date(isoStr).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}

// ── Date Range Filter ─────────────────────────────────────────────────────────
function setDateRange(days, chipEl) {
  dateRangeDays = days;
  document.querySelectorAll(".date-chip").forEach(c => c.classList.remove("active"));
  chipEl.classList.add("active");
  renderEventsTile();
}

// ── Events ────────────────────────────────────────────────────────────────────
async function fetchEvents() {
  const start = startOfToday();
  const end   = new Date(start.getTime() + (14 + 1) * 86400000); // always fetch 2 weeks max
  const { data, error } = await sb.from("calendar_events").select("*")
    .gte("start_time", start.toISOString())
    .lt("start_time", end.toISOString())
    .order("start_time");
  allEvents = error ? [] : (data || []);
  renderEventsTile();
}

function renderEventsTile() {
  const el    = document.getElementById("events-list");
  const limit = new Date(startOfToday().getTime() + (dateRangeDays + 1) * 86400000);
  const events = allEvents.filter(e => new Date(e.start_time) < limit);

  document.getElementById("events-count").textContent =
    events.length ? `${events.length} event${events.length > 1 ? "s" : ""}` : "";

  if (!events.length) { el.innerHTML = '<div class="empty">No events in this range</div>'; return; }

  // Group by date when showing more than today
  if (dateRangeDays === 0) {
    el.innerHTML = events.map(ev => eventRowHTML(ev, false)).join("");
  } else {
    const groups = {};
    events.forEach(ev => {
      const d = new Date(ev.start_time).toDateString();
      if (!groups[d]) groups[d] = [];
      groups[d].push(ev);
    });
    el.innerHTML = Object.entries(groups).map(([dateStr, evs]) => `
      <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:8px 0 4px;">${fmtGroupDate(dateStr)}</div>
      ${evs.map(ev => eventRowHTML(ev, false)).join("")}
    `).join("");
  }
}

function eventRowHTML(ev) {
  const timeStr = ev.all_day ? "All day" : fmtTime(ev.start_time) + (ev.end_time ? " – " + fmtTime(ev.end_time) : "");
  return `<div class="event-row">
    <div class="event-dot" style="background:${esc(ev.calendar_color||"#4A90D9")}"></div>
    <div class="event-info">
      <div class="event-title">${esc(ev.title)}</div>
      <div class="event-time">${timeStr}</div>
      ${ev.location ? `<div class="event-loc">📍 ${esc(ev.location)}</div>` : ""}
    </div>
  </div>`;
}

// ── To Do Tile ────────────────────────────────────────────────────────────────
function renderTodoTile() {
  const el    = document.getElementById("todo-list");
  const todos = allReminders.filter(r =>
    r.list_name === todoListName || r.list_name.toLowerCase() === todoListName.toLowerCase()
  );
  document.getElementById("todo-count").textContent = todos.length ? `${todos.length} item${todos.length>1?"s":""}` : "";
  if (!todos.length) { el.innerHTML = `<div class="empty">No items in "${esc(todoListName)}"</div>`; return; }
  el.innerHTML = todos.map(t => todoRowHTML(t)).join("");
}

async function addTodo() {
  const input = document.getElementById("todo-input");
  const title = input.value.trim();
  if (!title) return;
  input.value = "";

  // Find the list_id for the To Do list
  const list = reminderLists.find(l => l.name.toLowerCase() === todoListName.toLowerCase());
  if (!list) { toast(`List "${todoListName}" not found — check Settings`); return; }

  const newId = crypto.randomUUID();
  const now   = new Date().toISOString();

  // Optimistic insert into local state
  const newTodo = {
    id: newId, list_id: list.id, list_name: list.name,
    title, notes: null, due_date: null, completed: false,
    completed_at: null, priority: 0, icloud_account: "owner", synced_at: now
  };
  allReminders.unshift(newTodo);
  renderTodoTile();

  // Insert into Supabase
  await sb.from("reminders").insert(newTodo);
  // Note: the Scriptable sync will push this to iCloud on next run
  toast("Added — will sync to Reminders shortly");
}

async function addToActiveList() {
  if (!activeListId) { toast("Select a list first"); return; }
  const list = reminderLists.find(l => l.id === activeListId);
  if (!list) return;
  await addToList(activeListId, list.name, "reminders-input");
}

async function addToList(listId, listName, inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const title = input.value.trim();
  if (!title) return;
  input.value = "";

  const list = reminderLists.find(l => l.id === listId);
  if (!list) { toast(`List not found`); return; }

  const newId  = crypto.randomUUID();
  const now    = new Date().toISOString();
  const newTodo = {
    id: newId, list_id: listId, list_name: listName,
    title, notes: null, due_date: null, completed: false,
    completed_at: null, priority: 0, icloud_account: "owner", synced_at: now
  };
  allReminders.unshift(newTodo);

  // Re-render the relevant tile immediately
  if (listName.toLowerCase() === todoListName.toLowerCase()) renderTodoTile();
  if (listId === activeListId) renderRemindersTile();
  if (pinnedListIds.includes(listId)) renderPinnedTiles();

  await sb.from("reminders").insert(newTodo);

  // Queue the new item for write-back to Apple Reminders
  await sb.from("new_items_queue").insert({
    reminder_id: newId,
    list_name:   listName,
    title:       title,
    notes:       null,
    due_date:    null,
    priority:    0,
  });

  toast("Added — will sync to Reminders shortly");
}

// ── Reminders tile (single-select) ────────────────────────────────────────────
async function fetchReminders() {
  const { data: lists } = await sb.from("reminder_lists").select("*").order("name");
  if (lists) {
    lists.forEach(l => {
      const ex = reminderLists.find(r => r.id === l.id);
      if (ex !== undefined) l.visible = ex.visible;
    });
    reminderLists = lists;
    // Default activeListId to first visible list if not set or stale
    if (!activeListId || !reminderLists.find(l => l.id === activeListId)) {
      activeListId = reminderLists.find(l => l.visible !== false)?.id || null;
    }
  }

  const { data: todos } = await sb.from("reminders").select("*")
    .eq("completed", false).order("priority").order("due_date");
  allReminders = todos || [];

  renderListFilter();
  renderRemindersTile();
  renderTodoTile();
  renderPinnedTiles();
}

function renderListFilter() {
  const el = document.getElementById("list-filter");
  const visible = reminderLists.filter(l => l.visible !== false);
  if (!visible.length) { el.innerHTML = ""; return; }
  el.innerHTML = visible.map(list => {
    const isActive = list.id === activeListId;
    const style = isActive ? `background:${hexSoft(list.color)};border-color:${list.color};color:${list.color}` : "";
    return `<div class="list-chip ${isActive?"active":""}" style="${style}"
      onclick="selectList('${list.id}','${list.color}')">
      ${esc(list.name)}</div>`;
  }).join("");
}

function selectList(listId, color) {
  // Single-select: clicking an already-active list deselects it
  if (activeListId === listId) {
    activeListId = null;
  } else {
    activeListId = listId;
  }
  saveSetting("active_list_id", activeListId);
  renderListFilter();
  renderRemindersTile();
}

function renderRemindersTile() {
  const el    = document.getElementById("reminders-list");
  const addBar = document.getElementById("reminders-add");
  if (!activeListId) {
    el.innerHTML = '<div class="empty">Select a list above to view</div>';
    document.getElementById("reminder-count").textContent = "";
    addBar.style.display = "none";
    return;
  }
  addBar.style.display = "flex";
  const list  = reminderLists.find(l => l.id === activeListId);
  const input = document.getElementById("reminders-input");
  if (list) input.placeholder = `Add to ${list.name}\u2026`;
  const todos = allReminders.filter(r => r.list_id === activeListId);
  document.getElementById("reminder-count").textContent = todos.length ? `${todos.length} pending` : "All clear \u2713";
  if (!todos.length) { el.innerHTML = '<div class="empty">All clear \u2713</div>'; return; }
  el.innerHTML = todos.map(t => todoRowHTML(t)).join("");
}

// ── Pinned List Tiles ─────────────────────────────────────────────────────────
function renderPinnedTiles() {
  const container = document.getElementById("pinned-tiles");
  if (!pinnedListIds.length) { container.innerHTML = ""; return; }

  container.innerHTML = pinnedListIds.map(listId => {
    const list  = reminderLists.find(l => l.id === listId);
    if (!list) return "";
    const todos = allReminders.filter(r => r.list_id === listId);
    const rows  = todos.length
      ? todos.map(t => todoRowHTML(t)).join("")
      : '<div class="empty">All clear ✓</div>';
    return `
      <div class="tile" style="grid-column:span 1;">
        <div class="pinned-tile-header">
          <div class="pinned-tile-title">
            <span style="width:10px;height:10px;border-radius:50%;background:${list.color};display:inline-block;flex-shrink:0;"></span>
            ${esc(list.name)}
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;color:var(--text-muted)">${todos.length ? todos.length+" pending" : ""}</span>
            <button class="unpin-btn" onclick="unpinList('${listId}')">✕ unpin</button>
          </div>
        </div>
        <div class="tile-body" style="max-height:260px;">${rows}</div>
        <div class="todo-add">
          <input class="todo-input" id="pinned-input-${listId}"
            placeholder="Add to ${esc(list.name)}…"
            onkeydown="if(event.key==='Enter')addToList('${listId}','${esc(list.name)}','pinned-input-${listId}')" />
          <button class="todo-add-btn"
            onclick="addToList('${listId}','${esc(list.name)}','pinned-input-${listId}')">Add</button>
        </div>
      </div>`;
  }).join("");
}

function openAddListSheet() {
  const visible = reminderLists.filter(l => l.visible !== false && !pinnedListIds.includes(l.id));
  const opts = document.getElementById("add-list-options");
  if (!visible.length) {
    opts.innerHTML = '<div class="empty" style="padding:16px 0;">All lists are already pinned</div>';
  } else {
    opts.innerHTML = visible.map(list => {
      const count = allReminders.filter(r => r.list_id === list.id).length;
      return `<div class="sheet-list-option" onclick="pinList('${list.id}')">
        <div class="sheet-list-dot" style="background:${list.color}"></div>
        <div class="sheet-list-name">${esc(list.name)}</div>
        <div class="sheet-list-count">${count} pending</div>
      </div>`;
    }).join("");
  }
  document.getElementById("add-list-sheet").classList.add("open");
}
function closeAddListSheet() { document.getElementById("add-list-sheet").classList.remove("open"); }

async function pinList(listId) {
  closeAddListSheet();
  if (!pinnedListIds.includes(listId)) {
    pinnedListIds.push(listId);
    await saveSetting("pinned_list_ids", pinnedListIds);
    renderPinnedTiles();
  }
}

async function unpinList(listId) {
  pinnedListIds = pinnedListIds.filter(id => id !== listId);
  await saveSetting("pinned_list_ids", pinnedListIds);
  renderPinnedTiles();
}

// ── Todo interactions ─────────────────────────────────────────────────────────
function todoRowHTML(todo) {
  const overdue = todo.due_date && new Date(todo.due_date) < new Date() && !todo.completed;
  const dueStr  = todo.due_date ? fmtDate(todo.due_date) : "";
  const pColor  = todo.priority <= 1 ? "#E74C3C" : todo.priority <= 5 ? "#F39C12" : "transparent";
  return `<div class="todo-row ${todo.completed?"completed":""}" data-id="${todo.id}" data-account="${esc(todo.icloud_account||"owner")}">
    <div class="priority-dot" style="background:${pColor}"></div>
    <div class="todo-check">${todo.completed?"✓":""}</div>
    <div class="todo-title">${esc(todo.title)}</div>
    ${dueStr ? `<div class="todo-due ${overdue?"overdue":""}">${dueStr}</div>` : ""}
  </div>`;
}

// Attach via event delegation so it works for both static and pinned tiles
document.addEventListener("click", e => {
  const row = e.target.closest(".todo-row");
  if (row) toggleTodo(row);
});

async function toggleTodo(rowEl) {
  const id      = rowEl.dataset.id;
  const account = rowEl.dataset.account || "owner";
  if (!id) return;
  const isNowComplete = !rowEl.classList.contains("completed");
  rowEl.classList.toggle("completed", isNowComplete);
  const check = rowEl.querySelector(".todo-check");
  if (check) check.textContent = isNowComplete ? "✓" : "";

  await sb.from("reminders").update({
    completed: isNowComplete,
    completed_at: isNowComplete ? new Date().toISOString() : null
  }).eq("id", id);

  await sb.from("completion_queue").insert({
    reminder_id: id,
    list_id: allReminders.find(r => r.id === id)?.list_id || "",
    completed: isNowComplete,
    icloud_account: account,
  });

  // Update local state immediately
  const local = allReminders.find(r => r.id === id);
  if (local) local.completed = isNowComplete;

  setTimeout(() => fetchReminders(), 800);
}

// ── Weather ───────────────────────────────────────────────────────────────────
const WMO_CODES={0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Fog",48:"Icy fog",51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",77:"Snow grains",80:"Light showers",81:"Showers",82:"Heavy showers",85:"Snow showers",86:"Heavy snow showers",95:"Thunderstorm",96:"Thunderstorm w/ hail",99:"Heavy thunderstorm"};
const WMO_ICONS={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",71:"🌨",73:"❄️",75:"❄️",77:"🌨",80:"🌦",81:"🌧",82:"⛈",85:"🌨",86:"❄️",95:"⛈",96:"⛈",99:"⛈"};

async function fetchWeather() {
  const loc = settings.weatherLocation || "Albuquerque, NM";
  document.getElementById("weather-location-label").textContent = loc;
  try {
    const geo = await (await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(loc)}&format=json&limit=1`,{headers:{"Accept-Language":"en"}})).json();
    if (!geo.length) throw new Error("not found");
    const {lat,lon} = geo[0];
    const unit = settings.units==="metric"?"celsius":"fahrenheit";
    const wdata = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m&temperature_unit=${unit}&wind_speed_unit=mph&timezone=auto`)).json();
    const cur = wdata.current; const code = cur.weather_code; const deg = settings.units==="metric"?"°C":"°F";
    document.getElementById("weather-body").innerHTML = `
      <div class="weather-icon">${WMO_ICONS[code]||"🌡"}</div>
      <div class="weather-main">
        <div class="temp">${Math.round(cur.temperature_2m)}${deg}</div>
        <div class="condition">${WMO_CODES[code]||"Unknown"}</div>
        <div class="location">${esc(loc)}</div>
      </div>
      <div class="weather-details">
        <div class="wd-item"><div class="wd-label">Feels like</div>${Math.round(cur.apparent_temperature)}${deg}</div>
        <div class="wd-item"><div class="wd-label">Humidity</div>${cur.relative_humidity_2m}%</div>
        <div class="wd-item"><div class="wd-label">Wind</div>${Math.round(cur.wind_speed_10m)} mph</div>
        <div class="wd-item"><div class="wd-label">Updated</div>${fmtTime(cur.time)}</div>
      </div>`;
  } catch {
    document.getElementById("weather-body").innerHTML='<div class="empty">Weather unavailable — check Settings</div>';
  }
}

// ── Realtime ──────────────────────────────────────────────────────────────────
function subscribeRealtime() {
  sb.channel("dashboard")
    .on("postgres_changes",{event:"*",schema:"public",table:"reminders"},()=>fetchReminders())
    .on("postgres_changes",{event:"*",schema:"public",table:"calendar_events"},()=>fetchEvents())
    .on("postgres_changes",{event:"*",schema:"public",table:"dashboard_settings"},()=>loadSettings().then(()=>fetchWeather()))
    .subscribe();
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function startOfToday(){const d=new Date();d.setHours(0,0,0,0);return d;}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtTime(iso){if(!iso)return"";return new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});}
function fmtDate(iso){if(!iso)return"";const d=new Date(iso),t=new Date();if(d.toDateString()===t.toDateString())return"Today";return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function fmtGroupDate(dateStr){const d=new Date(dateStr),t=new Date();if(d.toDateString()===t.toDateString())return"Today";const tom=new Date(t);tom.setDate(t.getDate()+1);if(d.toDateString()===tom.toDateString())return"Tomorrow";return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
function hexSoft(hex){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},0.12)`;}catch{return"var(--accent-soft)";}}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2400);}
</script>
