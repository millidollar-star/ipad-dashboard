name: iCloud ↔ Supabase Sync

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 min — write-back queue
    - cron: "*/30 * * * *"   # every 30 min — full pull
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode: full or writeback"
        default: full

jobs:
  # ── Write-back: push dashboard completions → iCloud (every 5 min) ──────────
  writeback:
    name: Write completions back to iCloud
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run on the 5-min cron or manual writeback trigger
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'writeback' ||
      github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - name: Run write-back
        env:
          SYNC_MODE: writeback
          ICLOUD_USERNAME:          ${{ secrets.ICLOUD_USERNAME }}
          ICLOUD_PASSWORD:          ${{ secrets.ICLOUD_PASSWORD }}
          PARTNER_ICLOUD_USERNAME:  ${{ secrets.PARTNER_ICLOUD_USERNAME }}
          PARTNER_ICLOUD_PASSWORD:  ${{ secrets.PARTNER_ICLOUD_PASSWORD }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python sync.py

  # ── Full sync: pull iCloud → Supabase (every 30 min + on push) ────────────
  full-sync:
    name: Full iCloud → Supabase sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'writeback' ||
      github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - name: Run full sync
        env:
          SYNC_MODE: full
          ICLOUD_USERNAME:          ${{ secrets.ICLOUD_USERNAME }}
          ICLOUD_PASSWORD:          ${{ secrets.ICLOUD_PASSWORD }}
          PARTNER_ICLOUD_USERNAME:  ${{ secrets.PARTNER_ICLOUD_USERNAME }}
          PARTNER_ICLOUD_PASSWORD:  ${{ secrets.PARTNER_ICLOUD_PASSWORD }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python sync.py

  # ── Deploy dashboard to GitHub Pages (on push to main only) ───────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: full-sync
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
